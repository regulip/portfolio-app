<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reguli Patrik - Privát Portfólió</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- 1. RÉTEG: A Dinamikus Háttér (Később ide jön a színátmenet) -->
    <div class="background-canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <!-- 2. RÉTEG: A Főoldal (Kezdetben el lesz mosva a CSS által) -->
    <main id="main-content" class="blurred-content">

        <section class="fullscreen-section">
            <div class="glass-card hero-card">
                <h1 class="glass-text">Reguli Patrik</h1>
                <h3 class="glass-text-sub">Full-Stack Fejlesztő & IoT Integrátor</h3>
            </div>
        </section>

        <div id="secure-data-container">

            <section class="fullscreen-section">
                <div id="about-me" class="glass-card empty-card">
                    <h2 style="text-align: center; color: var(--accent); margin-bottom: 0;">Rólam</h2>
                </div>
            </section>

            <section class="fullscreen-section" style="flex-direction: column; gap: 20px;">

                <div style="display: flex; gap: 20px; width: 100%; height: 60%;">
                    <div id="education" class="glass-card empty-card" style="flex: 1;">
                        <h2 style="color: var(--accent);">SULI</h2>
                    </div>
                    <div id="experience" class="glass-card empty-card" style="flex: 1;">
                        <h2 style="color: var(--accent);">MUNKA</h2>
                    </div>
                </div>

                <div id="skills" class="glass-card empty-card" style="width: 100%; height: 40%;">
                    <h2 style="color: var(--accent);">KÉSZSÉG, HOBBI, STB</h2>
                </div>

            </section>

            <section class="fullscreen-section">
                <div id="github-module" class="glass-card empty-card">
                    <h2 style="text-align: center; color: var(--accent);">GitHub Projektek</h2>
                    </div>
            </section>

            <section class="fullscreen-section">
                <div id="iot-dashboard" class="glass-card empty-card">
                    <h2 style="text-align: center; color: var(--accent);">Élő Hardver Integráció</h2>
                    </div>
            </section>

        </div>

        <section class="fullscreen-section" style="padding: 0; height: auto; min-height: 20vh;">
                <div style="background-color: #1a1a1a; width: 100%; height: 100%; padding: 40px; color: #fff; text-align: center;">
                    <p>SÖTÉT TELJES SÁVBAN (Lábléc)</p>
                    <p style="color: #666;">© 2026 Reguli Patrik</p>
                </div>
            </section>

    </main>

    <!-- 3. RÉTEG: A Bejelentkező Zsilip (Legfelül, minden felett lebeg) -->
    <div id="login-overlay">
        <div class="glass-login-card">
            <h2>Privát Hozzáférés</h2>
            <p>A portfólió részletes megtekintéséhez azonosítás szükséges.</p>
            <input type="password" id="password-input" placeholder="Jelszó...">
            <button onclick="attemptGlassLogin()">Zsilip Nyitása</button>
            <p id="login-error" style="color: #ff4444; display: none;"></p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
